services:
  # Backend Web Service
  - type: web
    name: aeri-logistics-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn server:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: DB_NAME
        value: aeri_logistics

  # Frontend Static Site
  - type: web
    name: aeri-logistics-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm run build
    staticPublishPath: build
    plan: free
    envVars:
      - key: REACT_APP_BACKEND_URL
        value: https://aeri-logistics-backend.onrender.com
