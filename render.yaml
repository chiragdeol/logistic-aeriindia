services:
  # Backend Web Service
  - type: web
    name: aeri-logistics-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn server:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: DB_NAME
        value: aeri_logistics
      - key: PYTHON_VERSION
        value: 3.11.5
      - key: CORS_ORIGINS
        value: https://aeri-logistics-frontend.onrender.com,http://localhost:3000,http://localhost:3001

  # Frontend Static Site
  - type: web
    name: aeri-logistics-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm run build
    staticPublishPath: build
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: REACT_APP_BACKEND_URL
        value: https://aeri-logistics-backend.onrender.com
      - key: NPM_CONFIG_LEGACY_PEER_DEPS
        value: "true"
